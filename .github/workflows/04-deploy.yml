name: 04 Deploy Workflow

on:
  workflow_dispatch:                    # Manual trigger – you can also keep workflow_run if needed
  # Optional: trigger after build workflow succeeds (uncomment if desired)
  # workflow_run:
  #   workflows: ["03 Build and Push to ECR"]
  #   types: [completed]

env:
  # ---- ECR CONFIGURATION ----
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: my-app
  AWS_ROLE_ARN: arn:aws:iam::134563994214:role/ECRrole

  # ---- APP CONFIGURATION ----
  IMAGE_NAME: tiny-health-app          # kept for reference, but we'll use full ECR URI
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  id-token: write       # required for OIDC authentication with AWS
  contents: read        # to read repository info (if needed)

jobs:
  deploy-package:
    runs-on: ubuntu-latest
    # If you switch back to workflow_run, add this condition:
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Authenticate to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Determine image tag
      #    - For workflow_dispatch: you can accept a tag as input
      #    - For workflow_run: reconstruct from the build run as before
      - name: Set image tag
        id: image-tag
        run: |
          # If you use workflow_dispatch, you might want to pass the tag manually.
          # Here we assume you have a way to know the tag (e.g., from a previous build).
          # For demo, we use a fixed tag "latest" – replace with your logic.
          IMAGE_TAG="latest"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # 4. Pull the Docker image from ECR
      - name: Pull image from Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}

      # 5. Start container
      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}"

      # 6. Smoke test deployed app
      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      # 7. Stop container (cleanup)
      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true