name: 04 Deploy Workflow

on:
  workflow_dispatch:   # manual trigger only

env:
  # ---- ECR CONFIGURATION ----
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: my-app
  AWS_ROLE_ARN: arn:aws:iam::134563994214:role/ECRrole

  # ---- APP CONFIGURATION ----
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-package:
    runs-on: ubuntu-latest

    steps:
      # 1. Authenticate to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          IMAGE_TAG="2026-04-18-24603859530"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # 4. Pull the Docker image from ECR
      - name: Pull image from Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}

      # 5. Start container
      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}"

      # 6. Smoke test deployed app
      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      # 7. Stop container (cleanup)
      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true