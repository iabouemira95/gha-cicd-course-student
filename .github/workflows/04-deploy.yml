name: 04 Deploy Workflow

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_BASE_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Find build run by PR‑named artifact
        id: find-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          ARTIFACT_NAME="${ARTIFACT_BASE_NAME}-pr-${PR_NUMBER}"
          echo "Looking for artifact: $ARTIFACT_NAME"

          # Get all successful workflow runs for this commit
          RUNS_JSON=$(gh api repos/${{ github.repository }}/actions/runs \
            --jq "[.workflow_runs[] | select(.head_sha == \"${{ github.sha }}\" and .conclusion == \"success\")]")

          RUN_ID=""
          RUN_DATE=""

          # Loop through runs to find one that has our artifact
          for run_id in $(echo "$RUNS_JSON" | jq -r '.[].id'); do
            ARTIFACTS_JSON=$(gh api repos/${{ github.repository }}/actions/runs/$run_id/artifacts)
            if echo "$ARTIFACTS_JSON" | jq -e --arg name "$ARTIFACT_NAME" '.artifacts[] | select(.name == $name)' > /dev/null; then
              RUN_ID=$run_id
              RUN_DATE=$(gh api repos/${{ github.repository }}/actions/runs/$run_id --jq '.created_at' | cut -dT -f1)
              break
            fi
          done

          if [ -z "$RUN_ID" ]; then
            echo "❌ No build run found with artifact $ARTIFACT_NAME for commit ${{ github.sha }}"
            exit 1
          fi

          echo "✅ Found build run $RUN_ID (created $RUN_DATE)"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.find-run.outputs.artifact_name }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-run.outputs.run_id }}
          path: downloaded-artifact

      - name: Show downloaded files
        run: ls -R downloaded-artifact

      - name: Load Docker image
        run: docker load --input "downloaded-artifact/${IMAGE_TAR}"

      - name: Recreate image tag from build run
        id: image-tag
        run: |
          IMAGE_TAG="${{ steps.find-run.outputs.run_date }}-${{ steps.find-run.outputs.run_id }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "✅ App is healthy"
              exit 0
            fi
            echo "Waiting for app to become ready... (attempt $attempt/5)"
            sleep 2
          done
          echo "❌ App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true