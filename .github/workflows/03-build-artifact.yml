name: 03 Build and Push to ECR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  # Replace with your actual AWS Account ID and Region
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: my-app
  # The ARN of the role you created in AWS
  AWS_ROLE_ARN: arn:aws:iam::134563994214:role/ECRrole

jobs:
  build-package:
    runs-on: ubuntu-latest
    # STRATEGIC ADDITION: Required for OIDC authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # 1. Authenticate to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

# 3. Build, tag, and push image to ECR
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # MAP THE GLOBAL ENV TO THE STEP ENV HERE:
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }} 
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
