name: 03 Build Artifact Workflow
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened


env:
  IMAGE_NAME: tiny-health-app
  ECR_REPOSITORY: lab-app

permissions:
  contents: read

jobs:
  verify:
  # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        # Generate the dynamic tag and derive the full ECR image URIs for both tags.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          DYNAMIC_TAG="${TODAY}-${GITHUB_RUN_ID}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          DYNAMIC_IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${DYNAMIC_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          echo "dynamic_tag=$DYNAMIC_TAG"         >> "$GITHUB_OUTPUT"
          echo "dynamic_image=$DYNAMIC_IMAGE"     >> "$GITHUB_OUTPUT"
          echo "latest_image=$LATEST_IMAGE"       >> "$GITHUB_OUTPUT"
          echo "Dynamic tag : ${DYNAMIC_IMAGE}"
          echo "Latest tag  : ${LATEST_IMAGE}"

      - name: Build Docker image with both tags
        # Tag once with the unique run tag and once as latest.
        run: |
          docker build \
            -t "${{ steps.image-tag.outputs.dynamic_image }}" \
            -t "${{ steps.image-tag.outputs.latest_image }}" \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.image-tag.outputs.dynamic_image }}'
          format: 'table'
          # Fails the build if it finds HIGH or CRITICAL vulnerabilities
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Push dynamic tag to ECR
        run: docker push "${{ steps.image-tag.outputs.dynamic_image }}"

      - name: Push latest tag to ECR
        run: docker push "${{ steps.image-tag.outputs.latest_image }}"

      - name: Save image URI for deploy
        # Write the exact dynamic URI so the deploy workflow pulls the right image.
        run: echo "${{ steps.image-tag.outputs.dynamic_image }}" > image-uri.txt

      - name: Upload image URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image-uri.txt
          retention-days: 1