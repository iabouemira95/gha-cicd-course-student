name: 02 CI with Matrix and Build

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image

jobs:

  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version

  build:
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # 👈 نفس الماتريكس

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python   # 👈 اختياري لو محتاجه في build
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set image tag
        id: image_tag
        run: |
          IMAGE_TAG="py-${{ matrix.python-version }}-run-${GITHUB_RUN_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image_tag.outputs.image_tag }}" \
            .

      - name: Save Docker image as artifact file
        run: |
          docker save \
            "${IMAGE_NAME}:${{ steps.image_tag.outputs.image_tag }}" \
            -o "${IMAGE_TAR}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.python-version }}  # 👈 مهم
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7