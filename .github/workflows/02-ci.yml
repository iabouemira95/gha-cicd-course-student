name: CI with Matrix from Secret

on:
  workflow_dispatch:

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      python_versions: ${{ steps.export.outputs.python_versions }}

    steps:
      - name: Export secret to output
        id: export
        run: |
          echo "python_versions=${{ secrets.PYTHON }}" >> $GITHUB_OUTPUT

  ci:
    needs: set-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ${{ fromJson(needs.set-matrix.outputs.python_versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version