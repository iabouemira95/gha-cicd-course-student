name: 01-Hello-Exercise

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Distinguish Merged vs Closed
        run: |
          if [ "${{ github.event.pull_request.merged }}" == "true" ]; then
            echo "Success: The Pull Request was merged into main!"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual Trigger: This was started via workflow_dispatch."
          else
            echo "Notice: The Pull Request was closed without merging."
          fi
