# CI workflow using a Matrix strategy to test multiple Python versions
name: 02 CI Matrix Exercise

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci-matrix-exercise.yml"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    # --- Matrix Configuration ---
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Display Execution Date
        run: date

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python version
        # This confirms that the runner is actually using the version from the matrix
        run: |
          echo "Expected version: ${{ matrix.python-version }}"
          echo "Installed version:"
          python --version


      - name: Verify repository files
        run: ls -R

      - name: Run tests
        # Runs the tests for the current version in the matrix
        run: python -m unittest discover -s tests -v