# This first workflow is intentionally tiny.
# It helps s`tudents see what a GitHub Actions run looks like.
name: 01 Hello Workflow

on:
  # Run automatically when this workflow file changes.
  pull_request:
    types: [closed]
    branches:
      - main
  # Allow a safe manual run from the Actions tab too.
  workflow_dispatch:

jobs:
  on-merge:

    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Run on merge
        run: echo "The PR was successfully merged!this is saif"
      - name: Say hello
        # This single step is enough to show a full workflow run.
        run: echo "Hello from GitHub Actions - this is Ibrahim"
