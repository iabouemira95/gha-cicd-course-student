# This workflow verifies the code, and upon merge, builds and pushes to AWS ECR.
name: CI and ECR Push Workflow

on:
  #pull_request:
    #branches: [main]
    #types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  ECR_REPOSITORY: "iti-actions-assessment" 

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-and-push:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DYNAMIC_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          IMAGE_URI_DYNAMIC="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$DYNAMIC_TAG"
          IMAGE_URI_LATEST="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest_1"
          
          echo "==== Building Docker Image with multiple tags ===="
          docker build -t $IMAGE_URI_DYNAMIC -t $IMAGE_URI_LATEST .
          
          echo "==== Pushing Dynamic Tag to ECR ===="
          docker push $IMAGE_URI_DYNAMIC
          
          echo "==== Pushing Latest Tag to ECR ===="
          docker push $IMAGE_URI_LATEST