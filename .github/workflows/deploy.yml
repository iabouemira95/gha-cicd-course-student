name: 04 Deploy Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  ECR_REPOSITORY: lab-app

permissions:
  contents: read

jobs:
  deploy-package:
    # We are still using the standard GitHub runner
    runs-on: ubuntu-latest
    
    # Optional: Only run this job if the PR was actually merged, not just closed without merging
    if: github.event.pull_request.merged == true

    steps:
      - name: Execute deployment on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Pass GitHub Secrets and Env vars into the SSH action
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,CONTAINER_NAME,APP_PORT,ECR_REPOSITORY
          script: |
            echo "1. Setting up AWS credentials for this SSH session..."
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN
            export AWS_DEFAULT_REGION=$AWS_REGION

            echo "2. Calculating ECR Registry and Image URI..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

            echo "3. Logging into Amazon ECR..."
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "4. Pulling the latest image from ECR..."
            docker pull $FULL_IMAGE

            echo "5. Stopping and removing the old container (if it exists)..."
            docker rm -f $CONTAINER_NAME || true

            echo "6. Starting the new container..."
            docker run -d --name $CONTAINER_NAME -p ${APP_PORT}:8000 $FULL_IMAGE

            echo "7. Running smoke test on EC2 localhost..."
            for attempt in 1 2 3 4 5; do
              RESPONSE=$(curl --silent "http://127.0.0.1:${APP_PORT}/health" || true)
              if [ -n "$RESPONSE" ]; then
                echo "Health endpoint response: $RESPONSE"
                exit 0
              fi
              echo "Waiting for app to become ready..."
              sleep 2
            done
            
            echo "App did not become ready in time."
            # If the test fails, stop the broken container and fail the pipeline
            docker rm -f $CONTAINER_NAME || true
            exit 1