name: Test SSH Connection

on:
  workflow_dispatch: 

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run a command
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Successfully connected to the VM!"
            uptime
            whoami
            touch github_was_here.txt
            echo "Done by GitHub Actions at $(date)" > github_was_here.txt
