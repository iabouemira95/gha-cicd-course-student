name: SSH Server Deployment

on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Setup SSH agent with your secret key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 2. Add the server's public key to known_hosts to prevent interactive prompts
      - name: Add to known_hosts
        run: ssh-keyscan -H 44.200.17.104 >> ~/.ssh/known_hosts

      # 3. Execute your command (the agent handles authentication automatically)
      - name: Run remote deployment command
        run: ssh user@44.200.17.104 "echo 'Hello from GitHub Actions!'"