name: hello exercise
on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: If merged or workflow dispatch
          if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
          run: echo "Haeeeh"
        - name: If not merged
          if: github.event.pull_request.merged == false
          run: echo "Not merged yet"