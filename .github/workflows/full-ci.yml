# .github/workflows/02-03-ci-build.yml
name: 02-03 CI and Build Artifact Workflow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  push:
    branches: [main]

  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  AWS_REGION: us-east-1
  ECR_REPOSITORY: myrepo
  # Set to "oidc" or "access-key" to choose the auth method
  AWS_AUTH_METHOD: "access-key"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-package:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      id-token: write   # Required for OIDC — harmless to keep for access-key method
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # AUTH METHOD 1 — OIDC (Recommended)
      # Requires: AWS_ROLE_ARN, AWS_ACCOUNT_ID secrets
      # No long-lived credentials stored in GitHub.
      # To use: set AWS_AUTH_METHOD to "oidc" in env above.
      # ---------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        if: env.AWS_AUTH_METHOD == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------------------
      # AUTH METHOD 2 — Access Key & Secret Access Key
      # Requires: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID secrets
      # Simpler to set up but less secure — keys are long-lived credentials.
      # To use: set AWS_AUTH_METHOD to "access-key" in env above.
      # ---------------------------------------------------------------
      - name: Configure AWS credentials (Access Key)
        if: env.AWS_AUTH_METHOD == 'access-key'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate Docker to ECR
        id: ecr-registry
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr_registry=$ECR_REGISTRY" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:latest .

      - name: Tag image for ECR
        run: |
          docker tag \
            ${{ env.ECR_REPOSITORY }}:latest \
            ${{ steps.ecr-registry.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker tag \
            ${{ env.ECR_REPOSITORY }}:latest \
            ${{ steps.ecr-registry.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-registry.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.ecr-registry.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}

      - name: Save Docker image as artifact file
        run: |
          docker save \
            ${{ steps.ecr-registry.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }} \
            -o ${{ env.IMAGE_TAR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7