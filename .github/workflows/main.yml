# This first workflow is intentionally tiny.
# It helps students see what a GitHub Actions run looks like.
name: 01 Hello Workflow

on:
  # Run automatically when this workflow file changes.
  pull_request:
    branches:
        -main

jobs:
  say-hello:
    # GitHub provides a fresh runner for the job.
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        # This single step is enough to show a full workflow run.
        run: echo "Hello from GitHub Actions from lab1.."